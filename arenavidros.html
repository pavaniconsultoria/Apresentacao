:root{
  --bg:#244459;
  --bg-2:#264960;
  --panel:#2a5069;
  --panel-2:#305a76;
  --line:#3a6586;
  --line-2:#477da0;
  --txt:#f1f5f8;
  --txt-2:#c2d2dd;
  --txt-3:#90a8b9;
  --gold:#e0b257;
  --gold-bright:#f3cf7e;
  --green:#4fd39b;
  --red:#f0716a;
  --blue:#6fb3e8;
  --amber:#eab052;
  --glass:rgba(255,255,255,.035);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
.sans{font-family:'Poppins',-apple-system,sans-serif}
.mono{font-family:'SF Mono','Roboto Mono',Menlo,monospace;font-variant-numeric:tabular-nums}

/* texture overlay + brand glow */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.6;
  background:radial-gradient(1200px 620px at 82% -12%, rgba(224,178,87,.10), transparent 60%),
             radial-gradient(1000px 560px at -5% 105%, rgba(111,179,232,.10), transparent 58%),
             linear-gradient(180deg, rgba(0,0,0,.18), transparent 22%, transparent 80%, rgba(0,0,0,.22));
}
/* single discreet logo watermark, fixed center */
.wm{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}
.wm img{
  width:min(62vw,820px);
  opacity:.06;
  mix-blend-mode:screen;
}
.wrap{max-width:1180px;margin:0 auto;padding:0 28px;position:relative;z-index:2}

/* ---- HEADER / HERO ---- */
header{padding:80px 0 60px;border-bottom:1px solid var(--line);position:relative}
.eyebrow{
  font-family:'Poppins',-apple-system,sans-serif;font-size:11px;letter-spacing:.32em;text-transform:uppercase;
  color:var(--gold);font-weight:600;display:flex;align-items:center;gap:14px;margin-bottom:34px;
}
.eyebrow::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,var(--gold),transparent)}
h1.hero{font-size:clamp(36px,5.6vw,70px);line-height:1.08;font-weight:600;letter-spacing:-.025em;max-width:15ch}
h1.hero em{font-style:normal;font-weight:700;color:var(--gold-bright)}
.hero-sub{font-family:'Poppins',-apple-system,sans-serif;color:var(--txt-2);font-size:17px;max-width:60ch;margin-top:26px;line-height:1.65}
.hero-sub strong{color:var(--txt);font-weight:600}

/* KPI strip */
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;margin-top:54px;background:var(--line);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.kpi{background:var(--panel);padding:24px 22px;transition:background .3s}
.kpi:hover{background:var(--panel-2)}
.kpi .label{font-family:'Poppins',-apple-system,sans-serif;font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--txt-3);margin-bottom:14px}
.kpi .val{font-size:34px;font-weight:600;letter-spacing:-.02em;line-height:1}
.kpi .val.pos{color:var(--green)}
.kpi .val.neg{color:var(--red)}
.kpi .val.gold{color:var(--gold-bright)}
.kpi .foot{font-family:'Poppins',-apple-system,sans-serif;font-size:12px;color:var(--txt-2);margin-top:11px}

/* ---- SECTIONS ---- */
section{padding:72px 0;border-bottom:1px solid var(--line)}
.sec-num{font-family:'Poppins',-apple-system,sans-serif;font-size:12px;letter-spacing:.3em;color:var(--gold);font-weight:600;margin-bottom:16px}
h2{font-size:clamp(27px,3.6vw,40px);font-weight:600;letter-spacing:-.02em;line-height:1.14;margin-bottom:18px}
.sec-intro{font-family:'Poppins',-apple-system,sans-serif;color:var(--txt-2);font-size:16px;max-width:68ch;line-height:1.7;margin-bottom:44px}

/* cards grid */
.grid{display:grid;gap:18px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:24px}
.card .ttl{font-family:'Poppins',-apple-system,sans-serif;font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--txt-3);margin-bottom:12px}
.card .big{font-size:28px;font-weight:600;letter-spacing:-.02em;line-height:1}
.card .small{font-family:'Poppins',-apple-system,sans-serif;font-size:12.5px;color:var(--txt-2);margin-top:9px;line-height:1.5}
.tag{display:inline-block;font-family:'Poppins',-apple-system,sans-serif;font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:3px;text-transform:uppercase}
.tag.g{background:rgba(63,185,138,.13);color:var(--green)}
.tag.r{background:rgba(224,88,79,.13);color:var(--red)}
.tag.a{background:rgba(217,154,60,.14);color:var(--amber)}
.tag.b{background:rgba(77,143,214,.14);color:var(--blue)}
.pos{color:var(--green)}.neg{color:var(--red)}.gold{color:var(--gold-bright)}

/* chart panel */
.chart-panel{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:26px 26px 20px;margin-bottom:18px;overflow:hidden}
.chart-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;flex-wrap:wrap;gap:4px 12px}
.chart-head h3{font-family:'Poppins',-apple-system,sans-serif;font-size:15px;font-weight:600;letter-spacing:-.01em;flex:1 1 auto;min-width:0}
.chart-head .note{font-family:'Poppins',-apple-system,sans-serif;font-size:11.5px;color:var(--txt-3);flex:0 1 auto;text-align:right;white-space:normal}
.chart-box{position:relative;height:300px;margin-top:18px}
.chart-box.tall{height:360px}

/* table */
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-bottom:18px}
.tbl-scroll-hint{display:none}
table{width:100%;border-collapse:collapse;font-family:'Poppins',-apple-system,sans-serif;font-size:13.5px}
thead th{background:var(--panel-2);color:var(--txt-3);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;text-align:right;padding:14px 16px;border-bottom:1px solid var(--line-2)}
thead th:first-child{text-align:left}
tbody td{padding:13px 16px;text-align:right;border-bottom:1px solid var(--line);color:var(--txt);font-variant-numeric:tabular-nums}
tbody td:first-child{text-align:left;color:var(--txt)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--glass)}
tbody tr.total td{background:var(--panel-2);font-weight:700;border-top:1px solid var(--line-2)}
.row-lbl{font-weight:600}
.sub{color:var(--txt-2);font-size:12.5px}

/* callout */
.callout{border-left:3px solid var(--gold);background:linear-gradient(90deg,rgba(201,162,75,.06),transparent);padding:20px 24px;border-radius:0 6px 6px 0;margin:18px 0;font-family:-apple-system,sans-serif}
.callout.r{border-color:var(--red);background:linear-gradient(90deg,rgba(224,88,79,.07),transparent)}
.callout.g{border-color:var(--green);background:linear-gradient(90deg,rgba(63,185,138,.06),transparent)}
.callout .ch{font-weight:700;font-size:14.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.callout .cb{font-size:14px;color:var(--txt-2);line-height:1.65}

/* recommendation list */
.recs{display:grid;gap:14px;margin-top:10px}
.rec{display:grid;grid-template-columns:44px 1fr;gap:18px;background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:22px 24px;font-family:'Poppins',-apple-system,sans-serif;align-items:start}
.rec .n{font-family:'Poppins',sans-serif;font-size:30px;font-weight:700;color:var(--gold);line-height:1}
.rec .rt{font-weight:700;font-size:15.5px;margin-bottom:7px}
.rec .rd{font-size:13.5px;color:var(--txt-2);line-height:1.6}
.rec .rd b{color:var(--txt)}
.prio{font-family:'Poppins',-apple-system,sans-serif;font-size:9.5px;letter-spacing:.08em;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:3px;margin-left:8px;vertical-align:middle}
.prio.alta{background:rgba(224,88,79,.15);color:var(--red)}
.prio.media{background:rgba(217,154,60,.15);color:var(--amber)}

/* benchmark bar */
.bench{font-family:'Poppins',-apple-system,sans-serif;margin-bottom:20px}
.bench-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.bench-lbl{width:130px;font-size:13px;color:var(--txt-2);flex-shrink:0}
.bench-track{flex:1;height:30px;background:var(--bg-2);border-radius:4px;position:relative;border:1px solid var(--line)}
.bench-ideal{position:absolute;top:0;bottom:0;background:rgba(63,185,138,.12);border-left:1px dashed rgba(63,185,138,.4);border-right:1px dashed rgba(63,185,138,.4)}
.bench-fill{position:absolute;top:3px;bottom:3px;left:3px;border-radius:3px;display:flex;align-items:center;padding-left:9px;font-size:12px;font-weight:700;color:#0a0c10}
.bench-val{width:64px;text-align:right;font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums}

footer{padding:60px 0 80px;text-align:center;position:relative}
.foot-logo{font-family:'Poppins',-apple-system,sans-serif;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:10px}
.foot-meta{font-family:'Poppins',-apple-system,sans-serif;font-size:12px;color:var(--txt-3)}
.foot-symbol{position:absolute;right:24px;bottom:-2px;width:64px;height:auto;opacity:.92;pointer-events:none}

.fade{opacity:0;transform:translateY(24px);transition:opacity .7s ease,transform .7s ease}
.fade.in{opacity:1;transform:none}

@media(max-width:860px){
  .kpi-strip,.g3,.g4{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr}
  .wrap{padding:0 18px}
  .bench-lbl{width:92px}
  .chart-box{height:280px}
  header{padding:48px 0 40px}
  section{padding:52px 0}
  .wm img{width:min(80vw,520px)}
}
@media(max-width:560px){
  .wrap{padding:0 15px}
  header{padding:30px 0 32px}
  section{padding:40px 0}
  .eyebrow{margin-bottom:22px;font-size:10px;letter-spacing:.22em}
  h1.hero{font-size:clamp(30px,8.5vw,40px);line-height:1.12}
  .hero-sub{font-size:15px;margin-top:20px}
  .kpi-strip{grid-template-columns:1fr 1fr;margin-top:36px}
  .kpi{padding:18px 16px}
  .kpi .val{font-size:25px}
  .kpi .label{font-size:9.5px;letter-spacing:.1em}
  .kpi .foot{font-size:11px}
  h2{font-size:clamp(24px,6.5vw,30px)}
  .sec-num{font-size:11px;letter-spacing:.2em}
  .sec-intro{font-size:14.5px;margin-bottom:32px}
  /* single-column for tighter cards on phones */
  .g3,.g4{grid-template-columns:1fr}
  .card{padding:20px}
  .card .big{font-size:25px}
  .chart-panel{padding:18px 14px 14px}
  .chart-box{height:300px}
  .chart-box.tall{height:330px}
  .chart-head h3{font-size:14px}
  .chart-head .note{font-size:10.5px}
  /* recommendations stack the number above text */
  .rec{grid-template-columns:1fr;gap:6px;padding:18px 18px}
  .rec .n{font-size:24px}
  .callout{padding:16px 18px}
  .callout .cb{font-size:13px}
  /* tables: allow horizontal scroll so they never break layout */
  .tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;position:relative}
  table{min-width:560px}
  thead th,tbody td{padding:11px 12px;font-size:12.5px}
  /* visible scroll hint above each table on mobile */
  .tbl-scroll-hint{display:flex;align-items:center;gap:6px;font-family:'Poppins',sans-serif;font-size:11px;color:var(--gold);margin:-2px 2px 8px;letter-spacing:.04em}
  .wm img{width:min(86vw,420px)}
  /* footer: stack the symbol below the text so it never overlaps */
  footer{padding:46px 0 40px}
  .foot-symbol{position:static;display:block;margin:22px auto 0;width:46px;opacity:.85}
}
</style>
</head>

  <p class="sec-intro">Separar os dois canais revela a verdade mais importante da empresa. O <strong>Atacado responde por ${pct(recAtacado/recTotBruta)} da receita</strong> e é altamente lucrativo. O <strong>Online (marketplaces + varejo)</strong> tem boa receita, mas opera com <strong>EBITDA negativo</strong> — está destruindo valor a cada mês.</p>
  <div class="grid g2">
    <div class="chart-panel" style="margin:0">
      <div class="chart-head"><h3>Participação na receita bruta</h3><span class="note">Trimestre</span></div>
      <div class="chart-box"><canvas id="mixCanal"></canvas></div>
    </div>
    <div class="chart-panel" style="margin:0">
      <div class="chart-head"><h3>EBITDA por canal — mês a mês</h3><span class="note">Online despenca para o negativo</span></div>
      <div class="chart-box"><canvas id="ebitdaCanal"></canvas></div>
    </div>
  </div>
  <div class="tbl-scroll-hint">⇄ Deslize a tabela para o lado para ver todas as colunas</div>
  <div class="tbl-wrap" style="margin-top:18px">
    <table>
      <thead><tr><th>Canal — acumulado Tri</th><th>Receita Líq.</th><th>Mg. Bruta</th><th>EBITDA</th><th>Mg. EBITDA</th><th>Resultado</th></tr></thead>
      <tbody>
        <tr><td class="row-lbl">Atacado Vidros</td><td>${fmtK(sum(D.ATACADO.recLiq))}</td><td>${pct(sum(D.ATACADO.lucroBruto)/sum(D.ATACADO.recLiq))}</td><td class="pos">${fmtK(ebAtacado)}</td><td class="pos">${pct(ebAtacado/sum(D.ATACADO.recLiq))}</td><td><span class="tag g">Lucrativo</span></td></tr>
        <tr><td class="row-lbl">Online / Marketplace</td><td>${fmtK(sum(D.ONLINE.recLiq))}</td><td>${pct(sum(D.ONLINE.lucroBruto)/sum(D.ONLINE.recLiq))}</td><td class="neg">${fmtK(ebOnline)}</td><td class="neg">${pct(ebOnline/sum(D.ONLINE.recLiq))}</td><td><span class="tag r">Deficitário</span></td></tr>
        <tr class="total"><td>Consolidado</td><td>${fmtK(T.recLiq)}</td><td>${pct(T.lucroBruto/T.recLiq)}</td><td class="pos">${fmtK(T.ebitda)}</td><td>${pct(T.ebitda/T.recLiq)}</td><td></td></tr>
      </tbody>
    </table>
  </div>
  <div class="callout r">
    <div class="ch">🔴 O Online deteriora rápido — e acelera</div>
    <div class="cb">A margem bruta do canal Online caiu de <b>${pct(D.ONLINE.lucroBruto[0]/D.ONLINE.recLiq[0])} em janeiro para ${pct(D.ONLINE.lucroBruto[2]/D.ONLINE.recLiq[2])} em março</b>. O EBITDA saiu de positivo (${fmtK(D.ONLINE.ebitda[0])}) para ${fmtK(D.ONLINE.ebitda[2])}. Com receita praticamente estável, isso significa que <b>custos e despesas do canal (CMV, frete, comissões de marketplace, instalação) cresceram muito acima da receita</b>. No trimestre, o Online queimou ${fmtK(Math.abs(llOnline))} de prejuízo líquido — dinheiro gerado pelo Atacado e consumido aqui.</div>
  </div>
</div></section>

<!-- 04 CUSTOS -->
<section class="fade"><div class="wrap">
  <div class="sec-num">04 — Estrutura de Custos</div>
  <h2>Onde cada real de receita é gasto</h2>
  <p class="sec-intro">Em março, de cada R$ 100 de receita líquida, o CMV consumiu R$ ${(D.TOTAL.cmv[2]/D.TOTAL.recLiq[2]*100).toFixed(0)}, os demais custos diretos (frete, insumos, comissões) R$ ${((D.TOTAL.cogs[2]-D.TOTAL.cmv[2])/D.TOTAL.recLiq[2]*100).toFixed(0)}, e o SG&A (pessoas, estrutura) R$ ${(D.TOTAL.sga[2]/D.TOTAL.recLiq[2]*100).toFixed(0)}. Sobrou EBITDA de R$ ${(D.TOTAL.ebitda[2]/D.TOTAL.recLiq[2]*100).toFixed(0)} — que a despesa financeira então zerou.</p>
  <div class="grid g2">
    <div class="chart-panel" style="margin:0">
      <div class="chart-head"><h3>Composição da receita — Março</h3><span class="note">% sobre receita líquida</span></div>
      <div class="chart-box"><canvas id="custos"></canvas></div>
    </div>
    <div class="chart-panel" style="margin:0">
      <div class="chart-head"><h3>SG&A está subindo</h3><span class="note">Despesas administrativas e de vendas crescem</span></div>
      <div class="chart-box"><canvas id="sgaTrend"></canvas></div>
    </div>
  </div>
  <div class="callout a">
    <div class="ch">⚠ SG&A cresceu ${pct((D.TOTAL.sga[2]-D.TOTAL.sga[0])/D.TOTAL.sga[0])} em três meses</div>
    <div class="cb">As despesas com pessoas, estrutura e administração saltaram de ${fmtK(D.TOTAL.sga[0])} (jan) para ${fmtK(D.TOTAL.sga[2])} (mar). Parte de março tem itens não recorrentes (ativo imobilizado de R$ 37k, acordo extrajudicial de R$ 17k), mas a tendência de alta no SG&A pressiona a margem e merece controle orçamentário mensal.</div>
  </div>
</div></section>

<!-- 05 MIX DE PRODUTOS -->
<section class="fade"><div class="wrap">
  <div class="sec-num">05 — Mix de Produtos</div>
  <h2>Curva de margem por linha de produto</h2>
  <p class="sec-intro">Vidros (parabrisa, vigia, vidro de porta) e seus acessórios formam o portfólio. A análise de margem bruta por linha mostra onde a precificação está saudável e onde há espaço para renegociar custo ou repassar preço. Dados de março.</p>
  <div class="chart-panel">
    <div class="chart-head"><h3>Receita × Margem bruta por linha de produto — Março</h3><span class="note">Barra = receita · Linha = margem %</span></div>

  </div>

  <div class="tbl-wrap">

      <tbody id="prodRows"></tbody>
    </table>
  </div>
</div></section>

<!-- 06 BENCHMARK -->
<section class="fade"><div class="wrap">
  <div class="sec-num">06 — Benchmark Setorial</div>
  <h2>Como a Arena se compara ao ideal do setor</h2>
  <p class="sec-intro">Faixas de referência para distribuidoras de autopeças/vidros com bom giro e logística eficiente. A zona verde marca o intervalo ideal. A operação está saudável; o resultado líquido é o único indicador fora da meta — e a causa é financeira, não operacional.</p>
  <div class="card" style="padding:30px 28px">
    <div class="bench" id="benchBox"></div>
  </div>
</div></section>

<!-- 07 ONLINE DEEP DIVE -->
<section class="fade"><div class="wrap">
  <div class="sec-num">07 — Raio-X do Canal Online</div>
  <h2>O produto vende bem. O canal é que custa caro.</h2>
  <p class="sec-intro">Aqui está a descoberta mais contra-intuitiva da análise. Olhando só o produto vendido no Online, a margem bruta é <strong>excelente — entre 56% e 87%</strong>. Mas a DRE do canal mostra margem de apenas ${pct(sum(D.ONLINE.lucroBruto)/sum(D.ONLINE.recLiq))}. A diferença não está no preço nem no custo da mercadoria: está nos <strong>custos do canal</strong> — frete, comissões de marketplace, instalação, embalagem e quebras.</p>
  <div class="chart-panel">
    <div class="chart-head"><h3>Margem bruta por produto no Online — venda direta</h3><span class="note">Margem do produto isolado · 1º Tri 2026</span></div>
    <div class="chart-box tall"><canvas id="onlineProd"></canvas></div>
  </div>
  <div class="callout">
    <div class="ch">💡 O dinheiro evapora entre o produto e o resultado</div>
    <div class="cb">Se a margem do produto é de ~67% e o canal entrega só ${pct(sum(D.ONLINE.lucroBruto)/sum(D.ONLINE.recLiq))}, há um <b>diferencial de mais de 45 pontos percentuais</b> consumido por custos operacionais do canal. Em março, o Online pagou R$ 129k de envio por marketplace, R$ 145k de comissões e R$ 17k de mídia. <b>É exatamente aí — e não no preço de venda — que a ação corretiva deve mirar.</b> Renegociar tabela de frete, revisar comissões e cobrar instalação à parte pode recuperar a maior parte do prejuízo.</div>
  </div>
</div></section>

<!-- 08 DÍVIDA + SG&A -->
<section class="fade"><div class="wrap">
  <div class="sec-num">08 — Anatomia das Despesas</div>
  <h2>De onde vêm os dois maiores blocos de custo</h2>
  <p class="sec-intro">Dois conjuntos de despesa definem o resultado da Arena: a <strong>dívida financeira</strong> (que mata o lucro) e o <strong>SG&A</strong> (que pressiona a margem). Saber a composição de cada um aponta exatamente onde negociar e onde cortar.</p>
  <div class="grid g2">
    <div class="chart-panel" style="margin:0">
      <div class="chart-head"><h3>Despesa financeira — ${fmtM(sum(DESPFIN.val))} no trimestre</h3><span class="note">Quase tudo é empréstimo</span></div>
      <div class="chart-box"><canvas id="despFinChart"></canvas></div>
    </div>
    <div class="chart-panel" style="margin:0">
      <div class="chart-head"><h3>SG&A — ${fmtM(sum(SGA.val))} no trimestre</h3><span class="note">Pessoas dominam a estrutura</span></div>
      <div class="chart-box"><canvas id="sgaChart"></canvas></div>
    </div>
  </div>
  <div class="grid g2" style="margin-top:18px">
    <div class="callout r" style="margin:0">
      <div class="ch">🎯 ${pct(978511/sum(DESPFIN.val))} da dívida é uma só linha</div>
      <div class="cb">Empréstimos e financiamentos somam <b>${fmtK(978511)} dos ${fmtM(sum(DESPFIN.val))}</b> de despesa financeira. Isso simplifica a negociação: <b>uma única frente</b> — alongamento de prazo ou troca por linha mais barata — resolve quase todo o problema. Juros de conta garantida (${fmtK(27640)}) sinalizam uso de caixa emergencial que some quando o ciclo melhorar.</div>
    </div>
    <div class="callout" style="margin:0">
      <div class="ch">👥 Pessoas = ${pct(1036098/sum(SGA.val))} do SG&A</div>
      <div class="cb">A folha (salários, PJ, encargos, benefícios) é <b>${fmtK(1036098)}</b> — o maior bloco e, em geral, o mais rígido. O espaço de ganho rápido está em <b>Estrutura (${fmtK(253577)})</b> e <b>Outras Adm. (${fmtK(153444)})</b>, que incluíram itens não recorrentes em março (ativo imobilizado, acordo extrajudicial) e merecem teto orçamentário.</div>
    </div>
  </div>
</div></section>

<!-- 09 BREAKEVEN + CENÁRIOS -->
<section class="fade"><div class="wrap">
  <div class="sec-num">09 — Ponto de Equilíbrio & Cenários</div>
  <h2>Quanto a empresa precisa vender — e o que muda se agir</h2>
  <p class="sec-intro">Com margem de contribuição de ${pct(BE.mcConsol)}, a Arena precisa faturar <strong>${fmtK(BE.beOperMensal)}/mês</strong> para cobrir a operação (SG&A). Ela fatura quase o dobro — operação folgada. Mas quando se inclui o serviço da dívida, o ponto de equilíbrio sobe para <strong>${fmtK(BE.beDividaMensal)}/mês</strong>, e a folga cai para apenas 15%. É a dívida que deixa o resultado no fio da navalha.</p>
  <div class="grid g3">
    <div class="card"><div class="ttl">Breakeven operacional</div><div class="big pos">${fmtK(BE.beOperMensal)}</div><div class="small">por mês · cobre o SG&A. Receita atual está <span class="pos">96% acima</span>.</div></div>
    <div class="card"><div class="ttl">Breakeven com dívida</div><div class="big" style="color:var(--amber)">${fmtK(BE.beDividaMensal)}</div><div class="small">por mês · cobre SG&A + juros. Folga cai para <span style="color:var(--amber)">15%</span>.</div></div>
    <div class="card"><div class="ttl">Breakeven do Online</div><div class="big neg">${fmtK(BE.beOnlineTri/3)}</div><div class="small">por mês · o canal fatura abaixo disso. Falta <span class="neg">${fmtK(BE.gapOnline/3)}/mês</span> ou cortar custo.</div></div>
  </div>
  <div class="chart-panel" style="margin-top:18px">
    <div class="chart-head"><h3>Simulação — lucro líquido trimestral por cenário</h3><span class="note">O que cada ação adiciona ao resultado</span></div>
    <div class="chart-box"><canvas id="cenarios"></canvas></div>
  </div>
  <div class="callout g">
    <div class="ch">📈 O prêmio de agir é claro e mensurável</div>
    <div class="cb">Hoje o lucro líquido é ${fmtK(371915)}/tri. <b>Só renegociar a dívida o leva a ${fmtK(676274)}</b> — quase o dobro. Combinando dívida + Online no breakeven, chega a ${fmtK(747066)}. Com uma eficiência adicional de 10% no SG&A, o resultado salta para <b>${fmtK(892026)}/tri — 2,4× o atual</b>, sem precisar vender um real a mais. A alavanca de valor não está na receita: está em capital e custos.</div>
  </div>
</div></section>

<!-- 10 DIAGNÓSTICO -->
<section class="fade"><div class="wrap">
  <div class="sec-num">10 — Diagnóstico & Plano de Ação</div>
  <h2>Cinco movimentos para destravar o lucro</h2>
  <p class="sec-intro">A boa notícia: a Arena não precisa reinventar a operação. Precisa resolver a estrutura de capital e estancar o canal Online. Recomendações ordenadas por impacto no resultado.</p>
  <div class="recs">
    <div class="rec"><div class="n">1</div><div><div class="rt">Renegociar a dívida bancária <span class="prio alta">Prioridade máxima</span></div><div class="rd">As despesas financeiras consumiram <b>${fmtM(T.despFin)} no trimestre — ${pct(T.despFin/T.ebitda)} de todo o EBITDA gerado.</b> Em março, R$ 503k vieram de empréstimos/financiamentos. Alongar prazo, reduzir taxa ou consolidar dívidas pode, sozinho, levar o lucro líquido de ${fmtK(T.lucroLiq)} para a faixa de R$ 1 milhão/trimestre. É a alavanca de maior impacto da empresa.</div></div></div>
    <div class="rec"><div class="n">2</div><div><div class="rt">Estancar o prejuízo do canal Online <span class="prio alta">Prioridade alta</span></div><div class="rd">O Online queimou <b>${fmtK(Math.abs(llOnline))} no trimestre</b> com margem bruta despencando para ${pct(D.ONLINE.lucroBruto[2]/D.ONLINE.recLiq[2])}. Auditar comissões de marketplace, frete e custo de instalação por pedido. Definir um <b>preço mínimo por SKU que cubra o custo total do canal</b> e cortar produtos que vendem no prejuízo. Meta: EBITDA do canal ≥ 0 em 90 dias.</div></div></div>
    <div class="rec"><div class="n">3</div><div><div class="rt">Implantar controle orçamentário mensal de SG&A <span class="prio media">Prioridade média</span></div><div class="rd">O SG&A subiu <b>${pct((D.TOTAL.sga[2]-D.TOTAL.sga[0])/D.TOTAL.sga[0])} em três meses</b>. Separar despesas recorrentes de não recorrentes, definir meta-teto mensal por centro de custo (pessoas, estrutura, frete) e acompanhar o realizado vs. orçado todo mês.</div></div></div>
    <div class="rec"><div class="n">4</div><div><div class="rt">Proteger e expandir a margem do Atacado <span class="prio media">Prioridade média</span></div><div class="rd">O Atacado entrega <b>EBITDA de ${pct(ebAtacado/sum(D.ATACADO.recLiq))}</b> — é o motor da empresa. Aprofundar negociação com fornecedores de vidro (maior linha de CMV) e revisar a precificação das linhas de menor margem pode adicionar 1–2 p.p. de margem bruta sem esforço comercial adicional.</div></div></div>
    <div class="rec"><div class="n">5</div><div><div class="rt">Completar a DRE para visão real de viabilidade <span class="prio media">Prioridade média</span></div><div class="rd">A DRE atual não contempla <b>depreciação/amortização nem receitas financeiras</b>. Incluí-las dá a visão fiel da geração de caixa e fortalece a empresa para fins de crédito, valuation e tomada de decisão de investimento.</div></div></div>
  </div>
</div></section>

// ===== CHART DEFAULTS =====
const GOLD='#e0b257', GOLDB='#f3cf7e', GREEN='#4fd39b', RED='#f0716a', BLUE='#6fb3e8', AMBER='#eab052';
const GRID='rgba(255,255,255,.09)', TXT2='#c2d2dd', TXT3='#90a8b9';
Chart.defaults.font.family="Poppins,-apple-system,sans-serif";
Chart.defaults.font.size=12;
Chart.defaults.color=TXT2;
const brl=v=>'R$ '+Math.round(v/1000).toLocaleString('pt-BR')+'k';
const noLegend={legend:{display:false}};

// 1. WATERFALL (cascata)
(()=>{
  const rl=T.recLiq, cmv=-T.cmv, outros=-(T.cogs-T.cmv), sga=-T.sga, fin=-T.despFin;
  const lb=rl+cmv, eb=lb+outros+sga, ll=eb+fin;
  // floating bars: [base, top]
  const data=[
    [0,rl], [lb,rl], [eb+(-outros-sga),lb], [eb,eb+(-outros-sga)] ,[0,0]
  ];
  // simpler: use stacked transparent base
  const labels=['Receita Líq.','(−) CMV','(−) Custos dir.','(−) SG&A','EBITDA','(−) Desp. Fin.','Lucro Líq.'];
  const tops=[rl, rl, lb+outros, eb, eb, eb, ll];
  const bases=[0, lb, lb+outros, eb, 0, ll, 0];
  // value of each step (for bar height)
  const steps=[
    [0,rl],            // receita
    [lb,rl],           // -cmv
    [lb+outros,lb],    // -custos
    [eb,lb+outros],    // -sga
    [0,eb],            // EBITDA
    [ll,eb],           // -fin
    [0,ll]             // lucro liq
  ];
  const colors=[GOLD,RED,RED,RED,GREEN,RED,ll>=0?GREEN:RED];
  new Chart(document.getElementById('waterfall'),{
    type:'bar',
    data:{labels,datasets:[{
      data:steps.map(s=>[s[1],s[0]]),
      backgroundColor:colors,borderRadius:3,barPercentage:.72
    }]},
    options:{maintainAspectRatio:false,plugins:{...noLegend,tooltip:{callbacks:{label:c=>{
      const v=Math.abs(c.raw[0]-c.raw[1]);return ' '+fmt(v);}}}},
    scales:{y:{grid:{color:GRID},ticks:{callback:brl}},x:{grid:{display:false},ticks:{maxRotation:30,minRotation:0,font:{size:11}}}}}
  });
})();

new Chart(document.getElementById('monthly'),{

// 5. CUSTOS (composição março, horizontal stacked)

// 7. PRODUTOS (combo) + tabela
(()=>{
  const idx=[...PROD.nomes.keys()].sort((a,b)=>PROD.receita[b]-PROD.receita[a]);
  const nomes=idx.map(i=>PROD.nomes[i]), rec=idx.map(i=>PROD.receita[i]);
  const mg=idx.map(i=>(PROD.receita[i]-PROD.cmv[i])/PROD.receita[i]*100);
  new Chart(document.getElementById('produtos'),{
    data:{labels:nomes,datasets:[
      {type:'bar',label:'Receita',data:rec,backgroundColor:GOLD,borderRadius:3,yAxisID:'y',order:2},
      {type:'line',label:'Margem %',data:mg,borderColor:GREEN,backgroundColor:GREEN,borderWidth:2.5,tension:.3,pointRadius:4,pointBackgroundColor:GREEN,yAxisID:'y1',order:1}
    ]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:12,padding:14,font:{size:11.5}}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==='y1'?' Margem: '+c.raw.toFixed(1)+'%':' Receita: '+fmt(c.raw)}}},
    scales:{y:{position:'left',grid:{color:GRID},ticks:{callback:brl}},y1:{position:'right',grid:{display:false},ticks:{callback:v=>v+'%'},min:0,max:60},x:{grid:{display:false},ticks:{maxRotation:35,minRotation:20,font:{size:10.5}}}}}
  });
  // tabela
  const classe=m=>m>=40?['A · Premium','g']:m>=30?['A · Saudável','b']:m>=18?['B · Volume','a']:['C · Revisar','r'];
  document.getElementById('prodRows').innerHTML=idx.map(i=>{
    const m=(PROD.receita[i]-PROD.cmv[i])/PROD.receita[i]*100;const[cl,cls]=classe(m);
    return `<tr><td class="row-lbl">${PROD.nomes[i]}</td><td>${fmt(PROD.receita[i])}</td><td class="sub">${fmt(PROD.cmv[i])}</td><td>${fmt(PROD.receita[i]-PROD.cmv[i])}</td><td>${m.toFixed(1)}%</td><td><span class="tag ${cls}">${cl}</span></td></tr>`;
  }).join('');
})();

// 8. BENCHMARK bars
(()=>{
  const rows=[
    {lbl:'Margem Bruta',val:T.lucroBruto/T.recLiq*100,idealLo:25,idealHi:30,max:35,color:GREEN},
    {lbl:'Margem EBITDA',val:T.ebitda/T.recLiq*100,idealLo:10,idealHi:15,max:20,color:GREEN},
    {lbl:'Margem Líquida',val:T.lucroLiq/T.recLiq*100,idealLo:6,idealHi:9,max:15,color:AMBER},
    {lbl:'Dívida/EBITDA',val:T.despFin/T.ebitda*100,idealLo:0,idealHi:25,max:100,color:RED,inv:true,unit:'%'}
  ];
  document.getElementById('benchBox').innerHTML=rows.map(r=>{
    const w=Math.max(2,Math.min(100,r.val/r.max*100));
    const il=r.idealLo/r.max*100, iw=(r.idealHi-r.idealLo)/r.max*100;
    return `<div class="bench-row">
      <div class="bench-lbl">${r.lbl}</div>
      <div class="bench-track">
        <div class="bench-ideal" style="left:${il}%;width:${iw}%"></div>
        <div class="bench-fill" style="width:calc(${w}% - 6px);background:${r.color}">${r.val.toFixed(1)}%</div>
      </div>
      <div class="bench-val" style="color:${r.color}">${r.val.toFixed(1)}%</div>
    </div>`;
  }).join('')+`<div style="font-size:11.5px;color:${TXT3};margin-top:6px">A faixa verde marca o intervalo ideal do setor. Para Dívida/EBITDA, quanto menor, melhor.</div>`;
})();

// 9. ONLINE por produto (margem)
(()=>{
  const idx=[...ONPROD.nomes.keys()].sort((a,b)=>ONPROD.receita[b]-ONPROD.receita[a]);
  const nomes=idx.map(i=>ONPROD.nomes[i]);
  const mg=idx.map(i=>(ONPROD.receita[i]-ONPROD.cmv[i])/ONPROD.receita[i]*100);
  const rec=idx.map(i=>ONPROD.receita[i]);
  new Chart(document.getElementById('onlineProd'),{
    data:{labels:nomes,datasets:[
      {type:'bar',label:'Receita',data:rec,backgroundColor:BLUE,borderRadius:3,yAxisID:'y',order:2},
      {type:'line',label:'Margem do produto %',data:mg,borderColor:GREEN,backgroundColor:GREEN,borderWidth:2.5,tension:.3,pointRadius:4,pointBackgroundColor:GREEN,yAxisID:'y1',order:1}
    ]},
    options:{maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:12,padding:14,font:{size:11.5}}},tooltip:{callbacks:{label:c=>c.dataset.yAxisID==='y1'?' Margem produto: '+c.raw.toFixed(1)+'%':' Receita: '+fmt(c.raw)}}},
    scales:{y:{position:'left',grid:{color:GRID},ticks:{callback:brl}},y1:{position:'right',grid:{display:false},min:0,max:100,ticks:{callback:v=>v+'%'}},x:{grid:{display:false},ticks:{maxRotation:35,minRotation:20,font:{size:10.5}}}}}
  });
})();

// 10. DESPESA FINANCEIRA (doughnut)
new Chart(document.getElementById('despFinChart'),{
  type:'doughnut',
  data:{labels:DESPFIN.nomes,datasets:[{data:DESPFIN.val,backgroundColor:[RED,AMBER,'#7a5cc4',TXT3],borderColor:'#2a5069',borderWidth:3,hoverOffset:6}]},
  options:{maintainAspectRatio:false,cutout:'58%',layout:{padding:4},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:8,boxHeight:8,padding:12,font:{size:11}}},tooltip:{callbacks:{label:c=>' '+fmt(c.raw)+' ('+pct(c.raw/sum(DESPFIN.val))+')'}}}}
});

// 11. SG&A (doughnut)
const SGA_FULL=['Pessoas (folha, PJ, encargos, benefícios)','Estrutura (prédio, serviços, equipamentos)','Outras despesas administrativas','Investimentos'];
new Chart(document.getElementById('sgaChart'),{
  type:'doughnut',
  data:{labels:SGA.nomes,datasets:[{data:SGA.val,backgroundColor:[BLUE,GOLD,AMBER,GREEN],borderColor:'#2a5069',borderWidth:3,hoverOffset:6}]},
  options:{maintainAspectRatio:false,cutout:'58%',layout:{padding:4},plugins:{legend:{position:'bottom',labels:{usePointStyle:true,pointStyle:'circle',boxWidth:8,boxHeight:8,padding:12,font:{size:11}}},tooltip:{callbacks:{title:c=>SGA_FULL[c[0].dataIndex],label:c=>' '+fmt(c.raw)+' ('+pct(c.raw/sum(SGA.val))+')'}}}}
});

// 12. CENÁRIOS
(()=>{
  const cols=CEN.map((c,i)=>i===0?TXT3:i===CEN.length-1?GREEN:GOLD);
  new Chart(document.getElementById('cenarios'),{
    type:'bar',
    data:{labels:CEN.map(c=>c.lbl),datasets:[{data:CEN.map(c=>c.ll),backgroundColor:cols,borderRadius:4,barPercentage:.66}]},
    options:{maintainAspectRatio:false,plugins:{...noLegend,tooltip:{callbacks:{title:c=>CEN[c[0].dataIndex].lbl,label:c=>' Lucro líq.: '+fmt(c.raw),afterLabel:c=>CEN[c.dataIndex].desc}}},
    scales:{y:{grid:{color:GRID},ticks:{callback:brl}},x:{grid:{display:false},ticks:{font:{size:11}}}}}
  });
})();

// SCROLL ANIMATION (with safe fallback — content never stays hidden)
if('IntersectionObserver' in window){
  const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.08,rootMargin:'0px 0px -8% 0px'});
  document.querySelectorAll('.fade').forEach(el=>io.observe(el));
  // safety net: reveal anything still hidden after 4s
  setTimeout(()=>document.querySelectorAll('.fade:not(.in)').forEach(el=>el.classList.add('in')),4000);
}else{
  document.querySelectorAll('.fade').forEach(el=>el.classList.add('in'));
}
</script>
</body>
</html>
